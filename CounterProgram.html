<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive counter application with increase, decrease, and reset functionality">
    <title>Counter App</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="CounterProgram.css">
</head>
<body>
    <main>
        <h1>Counter Application</h1>
        <div class="counter-container">
            <output id="Counter" aria-label="Current counter value">0</output>
            <div id="buttons" role="group" aria-labelledby="counter-instructions">
                <p id="counter-instructions" class="sr-only">Use the buttons below to control the counter</p>
                <button id="decrease" class="btn" aria-label="Decrease counter by 1">Decrease</button>
                <button id="reset" class="btn" aria-label="Reset counter to 0">Reset</button>
                <button id="increase" class="btn" aria-label="Increase counter by 1">Increase</button>
            </div>
        </div>
    </main>
    <script src="CounterProgram.js"></script>
</body>
</html>
