<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .login-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-form h2 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }
        .login-form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-form button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-form button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <form class="login-form" action="/login" method="POST">
        <h2>Login</h2>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>

<script>
    const express = require('express');
    const bodyParser = require('body-parser');
    const sql = require('mssql');

    const app = express();
    const port = 3000;

    // Middleware to parse form data
    app.use(bodyParser.urlencoded({ extended: true }));

    // MSSQL database configuration
    const dbConfig = {
        user: 'bussu', // Replace with your DB username
        password: 'Bussu@007', // Replace with your DB password
        server: 'VAMSHIBUSSU', // Replace with your server name or IP 
        database: 'SGHS', // Replace with your database name
        options: {
            encrypt: true, // Use this if you're connecting to Azure
            trustServerCertificate: true, // Use this for local development
        },
    };

    // Route to handle form submission
    app.post('/login', async (req, res) => {
        const { username, password } = req.body;

        try {
            // Connect to the database
            const pool = await sql.connect(dbConfig);

            // Insert data into the database
            const result = await pool.request()
                .input('username', sql.VarChar, username)
                .input('password', sql.VarChar, password)
                .query('INSERT INTO Users (Username, Password) VALUES (@username, @password)');

            res.send('Data stored successfully!');
        } catch (err) {
            console.error('Database error:', err);
            res.status(500).send('Error storing data.');
        } finally {
            sql.close(); // Close the database connection
        }
    });

    // Start the server
    app.listen(port, () => {
        console.log(`Server running at http://localhost:${port}`);
    });
</script>
