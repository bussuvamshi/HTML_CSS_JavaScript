<body class="login-page">
    <header>
        <div id="header">
            <a href="https://www.keysight.com/us/en/home.html" target="_blank" rel="noopener noreferrer">
                <img src="Media/Keysight logo.png" alt="Keysight Logo" width="150" height="50">

        </nav>
        <hr>
    </header>
    <main id="body">
        <h1>Login/Signup</h1>
        <form action="submit_form.php" method="post">
            <label for="name">Name <span aria-label="required">*</span>:</label>
            <input type="text" id="name" name="name" placeholder="Enter Full Name" required>
            
            <label for="email">Email <span aria-label="required">*</span>:</label>
            <input type="email" id="email" name="email" placeholder="username@keysight.com" required>
            
            <label for="password">Password <span aria-label="required">*</span>:</label>
            <input type="password" id="password" name="password" placeholder="••••••" minlength="5" maxlength="7" required>
            <p class="password-hint">Password must be 5-7 characters long</p>
            
            <input type="submit" value="Submit">
            <p class="signup-link">First time on this page? Please <a href="Signup.html" target="_blank">Sign-up</a>.</p>
        </form>
    </main>
